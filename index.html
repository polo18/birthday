<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Joyeux Anniversaire 👑</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <!-- PAGE 1 -->
        <div id="touch">
            <p class="soft-text">Un petit message pour toi Dacine 🎀</p>
            <div class="tap">💖</div>
            <span class="tap-text">Touche ici</span>
        </div>

        <!-- PAGE 2 -->
        <div id="surprise" class="hidden">
            <h1 class="title animate-pop">Joyeux Anniversaire 💘</h1>

            <h2 class="subtitle animate-slide">
                Pour ma petite princesse 🌸 Dacine
            </h2>

            <p class="message animate-fade">
                En ce jour spécial,
                je te souhaite une journée douce et lumineuse,
                remplie de joie, de sourires
                et de beaux moments 💖

                Que cette nouvelle année
                t’apporte le bonheur
                et de jolies surprises ✨
            </p>

            <div id="date" class="date"></div>

            <div class="pulse-icon">💖</div>
        </div>

        <audio id="music" src="birthday-1.mp3"></audio>
        <canvas id="confetti"></canvas>

        <script src="script.js"></script>
    </body>
</html>
