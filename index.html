<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aïd Moubarak</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #1e293b);
  overflow: hidden;
}

/* écran intro */
#intro {
  position: fixed;
  inset: 0;
  background: #020617;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  transition: all 1s ease;
}

/* message caché */
#mainContent {
  opacity: 0;
  transition: opacity 1.5s ease;
}

/* glow */
.glow {
  text-shadow: 0 0 10px #fff, 0 0 20px #22c55e;
}

/* bouton */
.btn-open {
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.1);}
  100% {transform: scale(1);}
}

/* confetti */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body class="text-white text-center flex items-center justify-center min-h-screen">

  <!-- 🎶 AUDIO -->
  <audio id="music" loop>
      <source src="eidunsaeed.MP3" type="audio/mpeg">
  </audio>

  <!-- 🚪 INTRO -->
  <div id="intro">
    <h1 class="text-3xl mb-6 glow">✨ Message spécial ✨</h1>
  
    <button onclick="startApp()" class="btn-open bg-green-500 px-6 py-3 rounded-xl text-xl shadow-lg">
      🎁 Ouvrir
    </button>
  </div>

  <!-- 💌 CONTENU -->
  <div id="mainContent" class="px-4">

    <h1 class="text-4xl md:text-6xl font-bold glow mb-6">
    🌙 AÏD MOUBARAK 🌙
    </h1>

    <div class="bg-white/10 p-6 rounded-xl max-w-lg mx-auto">
      <p class="text-lg leading-relaxed">
        🕌 Que cette fête sacrée illumine votre cœur  
        <br><br>

        💖 Santé, bonheur et réussite  
        <br><br>
        🌙 Paix et bénédictions infinies  
        <br><br>
        🎉 Profitez avec votre famille  
        
        <br><br>
        <span class="text-green-400 text-2xl font-bold">
        ✨ AÏD MUBARAK ✨ <br>By Mouloud ZIDANE
        </span>
      </p>
    </div>
    <!-- 🎉 ICÔNES BAS -->
    <div class="icons-bottom fixed bottom-4 left-0 right-0 flex justify-center gap-6">
      <span>🕌</span>
      <span>🌙</span>
      <span>🎉</span>
      <span>✨</span>
      <span>🤲</span>
    </div>
  </div>

  <!-- 🎇 SCRIPT -->
  <script>
  function startApp() {
  
    // lancer musique
    document.getElementById("music").play();
  
    // cacher intro
    document.getElementById("intro").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("intro").style.display = "none";
    }, 800);
  
    // afficher contenu
    setTimeout(() => {
      document.getElementById("mainContent").style.opacity = "1";
    }, 500);
  
    // confetti
    for(let i=0;i<40;i++){
      let c=document.createElement("div");
      c.className="confetti";
      c.style.left=Math.random()*100+"%";
      c.style.animationDuration=(2+Math.random()*3)+"s";
      c.style.background=`hsl(${Math.random()*360},100%,50%)`;
      document.body.appendChild(c);
    }
  }
  </script>

</body>
</html>
