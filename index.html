<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Aïd Moubarak</title>

<style>
body {
    background: linear-gradient(135deg,#020617,#0f172a);
    overflow:hidden;
    color:white;
}

/* 🌙 lune */
.moon {
    position:absolute;
    top:50px;
    right:40px;
    width:80px;
    height:80px;
    background:#facc15;
    border-radius:50%;
    box-shadow:0 0 40px #facc15;
}
</style>
</head>

<body class="flex items-center justify-center h-screen">

<div class="moon"></div>

<div class="text-center px-6">

    <h1 id="title" class="text-4xl md:text-6xl font-bold text-green-400 mb-6">
        🌙 Aïd Moubarak
    </h1>

    <p id="msg" class="text-lg md:text-2xl mb-8 text-gray-300">
        Clique pour découvrir ton message 🎁
    </p>

    <button onclick="start()" 
    class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-xl text-lg shadow-xl">
        ▶️ Ouvrir
    </button>

</div>

<!-- 🎧 musique -->
<audio id="music" loop>
    <source src="music/aid.mp3" type="audio/mpeg">
</audio>

<script>
// prénom dynamique
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){
    document.getElementById("title").innerHTML = "🌙 Aïd Moubarak " + name;
}

function start(){
    document.getElementById("music").play();

    document.getElementById("msg").innerHTML =
    "✨ Que cette fête t'apporte joie, paix et réussite ✨";

    fireworks();
}

// 🎆 effet premium
function fireworks(){
    setInterval(()=>{
        let p=document.createElement("div");
        p.style.position="absolute";
        p.style.width="4px";
        p.style.height="4px";
        p.style.background="white";
        p.style.top=Math.random()*window.innerHeight+"px";
        p.style.left=Math.random()*window.innerWidth+"px";
        p.style.borderRadius="50%";
        p.style.boxShadow="0 0 15px white";
        document.body.appendChild(p);

        setTimeout(()=>p.remove(),800);
    },150);
}
</script>

</body>
</html>
