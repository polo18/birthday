<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aïd Moubarak</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    margin:0;
    background: radial-gradient(circle, #020617, #000);
    overflow:hidden;
    color:white;
}

/* 🎭 rideaux */
.curtain {
    position:fixed;
    top:0;
    width:50%;
    height:100%;
    background:#020617;
    z-index:10;
    transition:all 2s ease;
}
.left { left:0; }
.right { right:0; }

/* 🌙 lune */
.moon {
    position:absolute;
    top:50px;
    right:50px;
    width:100px;
    height:100px;
    background:#facc15;
    border-radius:50%;
    box-shadow:0 0 50px #facc15;
}

/* ✨ animation */
.fade {
    opacity:0;
    transform:translateY(20px);
    transition:1.5s;
}
.show {
    opacity:1;
    transform:translateY(0);
}
</style>
</head>

<body>

<div class="curtain left" id="left"></div>
<div class="curtain right" id="right"></div>

<div class="moon"></div>

<div class="flex items-center justify-center h-screen text-center px-4">
    <div>
        <h1 id="title" class="text-4xl md:text-6xl text-green-400 mb-6 fade">
            🌙 Aïd Moubarak
        </h1>

        <p class="text-lg md:text-2xl mb-6 fade" id="msg">
            Clique pour découvrir ton message 🎁
        </p>

        <button onclick="openCurtain()" 
        class="bg-green-500 px-6 py-3 rounded-xl text-lg">
        👉 Ouvrir
        </button>
    </div>
</div>

<!-- 🎧 musique -->
<audio id="music" loop>
    <source src="music/aid.mp3" type="audio/mpeg">
</audio>

<script>
// 🎯 prénom dynamique
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){
    document.getElementById("title").innerHTML = "🌙 Aïd Moubarak " + name;
}

// 🎭 ouvrir rideau
function openCurtain(){
    document.getElementById("left").style.width = "0";
    document.getElementById("right").style.width = "0";

    document.getElementById("music").play();

    // afficher contenu
    setTimeout(()=>{
        document.querySelectorAll('.fade').forEach(el=>{
            el.classList.add('show');
        });

        document.getElementById("msg").innerHTML =
        "✨ Que cette fête t'apporte joie, bonheur et réussite ✨";
    },1000);

    fireworks();
}

// 🎆 feu d’artifice
function fireworks(){
    setInterval(()=>{
        let p=document.createElement("div");
        p.style.position="absolute";
        p.style.width="6px";
        p.style.height="6px";
        p.style.background="gold";
        p.style.top=Math.random()*window.innerHeight+"px";
        p.style.left=Math.random()*window.innerWidth+"px";
        p.style.borderRadius="50%";
        p.style.boxShadow="0 0 20px gold";
        document.body.appendChild(p);

        setTimeout(()=>p.remove(),1000);
    },200);
}

// ⭐ étoiles
for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.style.position="absolute";
    s.style.width="2px";
    s.style.height="2px";
    s.style.background="white";
    s.style.top=Math.random()*window.innerHeight+"px";
    s.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(s);
}
</script>

</body>
</html>
