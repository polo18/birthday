<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aïd Moubarak</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(135deg,#020617,#020617,#0f172a);
    overflow: hidden;
}

/* animation bulle SMS */
.bubble {
    animation: slideUp 1.5s ease;
}

@keyframes slideUp {
    from {opacity:0; transform:translateY(50px);}
    to {opacity:1; transform:translateY(0);}
}

/* lune */
.moon {
    position:absolute;
    top:30px;
    right:30px;
    width:80px;
    height:80px;
    background:#facc15;
    border-radius:50%;
    box-shadow:0 0 40px #facc15;
}
</style>
</head>

<body class="flex items-center justify-center h-screen text-white">

<div class="moon"></div>

<div class="w-full max-w-md p-4">

    <!-- message style SMS -->
    <div class="bg-gray-800 p-4 rounded-2xl shadow-xl space-y-3">

        <div class="bubble bg-green-500 text-black p-3 rounded-xl w-fit">
            🌙 Aïd Moubarak
        </div>

        <div id="msg" class="bubble bg-gray-700 p-3 rounded-xl w-fit">
            Que cette fête vous apporte joie et réussite ✨
        </div>

        <div class="bubble text-sm text-gray-400">
            - Garage Zidane Services
        </div>
    </div>

    <!-- bouton -->
    <div class="text-center mt-6">
        <button onclick="startExperience()" 
        class="bg-green-500 px-6 py-3 rounded-xl">
        ▶️ Voir le message
        </button>
    </div>
</div>

<!-- 🎧 musique -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bde19.mp3" type="audio/mpeg">
</audio>

<script>
// prénom dynamique
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){
    document.getElementById("msg").innerHTML =
    "Aïd Moubarak " + name + " 🌙✨<br>Que cette fête t'apporte bonheur";
}

// lancer expérience
function startExperience(){
    document.getElementById("music").play();

    // 🎆 explosion effet
    for(let i=0;i<30;i++){
        let p=document.createElement("div");
        p.style.position="absolute";
        p.style.width="5px";
        p.style.height="5px";
        p.style.background="gold";
        p.style.top=Math.random()*window.innerHeight+"px";
        p.style.left=Math.random()*window.innerWidth+"px";
        p.style.borderRadius="50%";
        p.style.boxShadow="0 0 20px gold";
        document.body.appendChild(p);

        setTimeout(()=>p.remove(),1000);
    }
}

// étoiles
for(let i=0;i<50;i++){
    let s=document.createElement("div");
    s.style.position="absolute";
    s.style.width="2px";
    s.style.height="2px";
    s.style.background="white";
    s.style.top=Math.random()*window.innerHeight+"px";
    s.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(s);
}
</script>

</body>
</html>
