<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Aïd Moubarak</title>

<style>
body {
    background: radial-gradient(circle, #020617, #000);
    overflow: hidden;
    color: white;
}

/* 🌙 lune */
.moon {
    position:absolute;
    top:40px;
    right:40px;
    width:80px;
    height:80px;
    background:#facc15;
    border-radius:50%;
    box-shadow:0 0 40px #facc15;
}

/* ✨ texte glow */
.big-text {
    font-size: 2.5rem;
    line-height: 1.5;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #22c55e; }
    to { text-shadow: 0 0 30px #22c55e; }
}

/* 🎉 icônes améliorées */
.icon {
    position:absolute;
    font-size:28px;
    animation: rise 4s ease-out forwards;
}

@keyframes rise {
    0% {
        transform: translateY(0) scale(0.5) rotate(0deg);
        opacity: 0;
    }
    20% {
        opacity:1;
    }
    100% {
        transform: translateY(-250px) scale(1.5) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body class="flex items-center justify-center h-screen">

<div class="moon"></div>

<div class="text-center px-6 max-w-xl">

    <h1 id="title" class="text-4xl md:text-6xl font-bold text-green-400 mb-6">
        🌙 Aïd Moubarak
    </h1>

    <p id="msg" class="text-xl md:text-2xl mb-8 text-gray-300">
        Clique pour voir ton message 🎁
    </p>

    <button id="btn" onclick="start()" 
    class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-xl text-lg shadow-xl transition">
        ▶️ Ouvrir
    </button>

</div>

<!-- 🎧 musique -->
<audio id="music" loop>
    <source src="eidunsaeed.MP3" type="audio/mpeg">
</audio>

<script>
// prénom dynamique
const params = new URLSearchParams(window.location.search);
const name = params.get("name");

if(name){
    document.getElementById("title").innerHTML = "🌙 Aïd Moubarak " + name;
}

// 🚀 lancement
function start(){
    document.getElementById("music").play();

    document.getElementById("btn").style.display = "none";

    // 💎 message amélioré
    document.getElementById("msg").innerHTML =
    "✨ À l’occasion de l’Aïd El Fitr 🌙<br><br>" +
    "Je te souhaite une fête remplie de joie, de paix et de bonheur 🤲<br><br>" +
    "Que cette journée sacrée t’apporte réussite, santé et prospérité 💫<br><br>" +
    "🙏 Merci pour ta confiance et ton soutien<br>" +
    "💼 Garage Zidane Services<br><br>" +
    "🎉 Aïd Moubarak ! 🎉";

    document.getElementById("msg").classList.add("big-text");

    fireworks();
    icons();
}

// 🎆 feu d’artifice
function fireworks(){
    setInterval(()=>{
        let p=document.createElement("div");
        p.style.position="absolute";
        p.style.width="5px";
        p.style.height="5px";
        p.style.background="gold";
        p.style.top=Math.random()*window.innerHeight+"px";
        p.style.left=Math.random()*window.innerWidth+"px";
        p.style.borderRadius="50%";
        p.style.boxShadow="0 0 20px gold";
        document.body.appendChild(p);

        setTimeout(()=>p.remove(),1000);
    },150);
}

// 🎉 icônes visibles
function icons(){
    const emojis = ["🌙","✨","🎉","🕌","💫","⭐","🤲"];

    setInterval(()=>{
        let icon = document.createElement("div");
        icon.className = "icon";
        icon.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

        // ✅ commencer visible en bas
        icon.style.left = Math.random()*window.innerWidth + "px";
        icon.style.bottom = "0px";

        document.body.appendChild(icon);

        setTimeout(()=>icon.remove(),4000);
    },300);
}

// ⭐ étoiles fond
for(let i=0;i<70;i++){
    let s=document.createElement("div");
    s.style.position="absolute";
    s.style.width="2px";
    s.style.height="2px";
    s.style.background="white";
    s.style.top=Math.random()*window.innerHeight+"px";
    s.style.left=Math.random()*window.innerWidth+"px";
    document.body.appendChild(s);
}
</script>

</body>
</html>
